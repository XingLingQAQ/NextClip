version: "3.9"
services:
  cloudclip:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      NODE_ENV: production
      PORT: 5000
      # REQUIRED: Generate a strong random secret before deploying.
      # Example: openssl rand -base64 32
      SESSION_SECRET: ${SESSION_SECRET:?ERROR: SESSION_SECRET must be set. Run: export SESSION_SECRET=$(openssl rand -base64 32)}
    volumes:
      - ./clipboard.db:/app/clipboard.db
