version: "3.9"
services:
  nextclip:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      SESSION_SECRET: ${SESSION_SECRET:?ERROR: SESSION_SECRET must be set}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-}
    volumes:
      - ./data:/app/data
